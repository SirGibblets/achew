[project]
site_name = "Achew Docs"
site_description = "Achew user documentation"
site_url = "https://achew.readthedocs.io/"
repo_url = "https://github.com/SirGibblets/achew"
repo_name = "SirGibblets/achew"
edit_uri = "edit/main/docs/"
dev_addr = "localhost:3000"

extra_css = ["stylesheets/custom.css"]

[project.theme]
name = "material"
logo = "img/logo.svg"
favicon = "img/favicon.svg"
features = [
  "navigation.indexes",
  "navigation.footer",
  "toc.follow",
  "content.code.copy",
  "content.footnote.tooltips",
  "content.tabs.link",
  "search.suggest",
  "search.highlight",
  "search.share",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.blocks.caption]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.tilde]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.zensical.extensions.glightbox]

[project.extra]
generator = false

[project.extra.version]
provider = "mike"
default = "latest"

