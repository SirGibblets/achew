repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyright
        name: pyright (backend)
        entry: bash -c 'cd backend && uv run pyright'
        language: system
        types: [python]
        files: ^backend/.*\.py$
        pass_filenames: false
        require_serial: true
