repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyright
        name: pyright (backend)
        entry: bash -c 'cd backend && uv run pyright'
        language: system
        types: [python]
        files: ^backend/.*\.py$
        pass_filenames: false
        require_serial: true

      - id: prettier
        name: prettier (frontend)
        entry: bash -c 'paths=("${@/#frontend\//}"); cd frontend && exec npx prettier --write "${paths[@]}"' --
        language: system
        files: ^frontend/.*\.(ts|js|svelte|json|css|html)$

      - id: eslint
        name: eslint (frontend)
        entry: bash -c 'paths=("${@/#frontend\//}"); cd frontend && exec npx eslint --fix "${paths[@]}"' --
        language: system
        files: ^frontend/.*\.(ts|js|svelte)$

      - id: svelte-check
        name: svelte-check (frontend)
        entry: bash -c 'cd frontend && npx svelte-check --tsconfig ./tsconfig.json'
        language: system
        files: ^frontend/.*\.(ts|svelte)$
        pass_filenames: false
        require_serial: true
