name: Build and publish branch image

on:
  workflow_dispatch:

env:
  IMAGE_NAME: sirgibblets/achew

jobs:
  build-and-push-image:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get build metadata
        id: meta
        run: |
          VERSION=$(grep -Po '(?<=^version = ")[^"]+' backend/pyproject.toml)
          BRANCH=$(echo "${GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g' | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(git rev-parse --short HEAD)
          FULL_SHA=$(git rev-parse HEAD)

          {
            echo "version=${VERSION}"
            echo "branch=${BRANCH}"
            echo "short_sha=${SHORT_SHA}"
            echo "full_sha=${FULL_SHA}"
            echo "tag=${VERSION}-${BRANCH}"
            echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          build-args: |
            VERSION=${{ steps.meta.outputs.tag }}
            REVISION=${{ steps.meta.outputs.full_sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            BUILD_META=${{ steps.meta.outputs.branch }} ${{ steps.meta.outputs.short_sha }} ${{ steps.meta.outputs.full_sha }}
